name: Scrape Commodity Prices

on:
  schedule:
    # Runs daily at 08:00 AM UTC (1:30 PM Indian Standard Time)
    - cron: '0 8 * * *'
  workflow_dispatch:
    # Allows manual trigger from the GitHub Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Scraper
        run: python scrape.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.js
          # Commit only if there are changes in prices.js to avoid empty commits
          git diff-index --quiet HEAD || git commit -m "Auto-update commodity prices"
          git push
